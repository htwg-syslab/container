<script>
  (function() {
    var html = document.documentElement;
    var isLight = localStorage.getItem('jtd-theme') === 'light';

    var btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.setAttribute('aria-label', 'Toggle light/dark mode');
    btn.textContent = isLight ? '\uD83C\uDF19' : '\u2600\uFE0F';

    btn.addEventListener('click', function() {
      var goLight = !html.classList.contains('light-mode');
      html.classList.toggle('light-mode', goLight);
      localStorage.setItem('jtd-theme', goLight ? 'light' : 'dark');
      btn.textContent = goLight ? '\uD83C\uDF19' : '\u2600\uFE0F';
    });

    document.body.appendChild(btn);
  })();
</script>
