<script>
  (function() {
    function isLight() {
      return localStorage.getItem('jtd-theme') === 'light';
    }

    // Class auf body setzen (head_custom setzt es auf html, hier auf body)
    if (isLight()) {
      document.body.classList.add('light-mode');
    }

    var btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.setAttribute('aria-label', 'Toggle light/dark mode');
    btn.textContent = isLight() ? '\uD83C\uDF19' : '\u2600\uFE0F';

    btn.addEventListener('click', function() {
      var goLight = !document.body.classList.contains('light-mode');
      if (goLight) {
        document.body.classList.add('light-mode');
        document.documentElement.classList.add('light-mode');
        localStorage.setItem('jtd-theme', 'light');
        btn.textContent = '\uD83C\uDF19';
      } else {
        document.body.classList.remove('light-mode');
        document.documentElement.classList.remove('light-mode');
        localStorage.setItem('jtd-theme', 'dark');
        btn.textContent = '\u2600\uFE0F';
      }
    });

    document.body.appendChild(btn);
  })();
</script>
