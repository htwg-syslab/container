<style>

  body.light-mode {
    --body-background-color: #fff;
    --sidebar-color: #f5f6fa;
    --body-text-color: #27262b;
    --link-color: #7253ed;
    --body-heading-color: #27262b;
    --nav-child-link-color: #27262b;
    --search-result-preview-color: #27262b;
    --border-color: #eeebee;
    --code-background-color: #f5f6fa;
    --table-background-color: #fff;
    --search-background-color: #fff;
    --feedback-color: #27262b;
    --btn-primary-color: #7253ed;
  }
  body.light-mode .side-bar {
    background-color: #f5f6fa;
  }
  body.light-mode .site-title {
    color: #27262b;
  }
  body.light-mode .nav-list-link {
    color: #27262b;
  }
  body.light-mode .nav-list-link.active {
    color: #7253ed;
  }
  body.light-mode .search-input {
    background-color: #fff;
    color: #27262b;
    border-color: #eeebee;
  }
  body.light-mode .main-content {
    color: #27262b;
  }
  body.light-mode .main-content h1,

  body.light-mode .main-content h3,
  body.light-mode .main-content h4 {

    color: #959396;

  .theme-toggle {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 100;
    background: #2f3237;
    color: #fff;

<script>
  // Sofort anwenden bevor die Seite rendert
  (function() {
    if (localStorage.getItem('jtd-theme') === 'light') {
      document.documentElement.classList.add('light-mode');
    }
  })();
</script>
