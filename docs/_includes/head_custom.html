<style>
  .theme-toggle {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 100;
    background: #2f3237;
    color: #fff;
    border: 1px solid #444;
    border-radius: 50%;
    width: 2.5rem;
    height: 2.5rem;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transition: all 0.2s;
  }
  .theme-toggle.light {
    background: #f5f6fa;
    color: #333;
    border-color: #ccc;
  }
  .theme-toggle:hover {
    opacity: 0.8;
  }
</style>

<!-- Sofort Stylesheet tauschen falls light gespeichert, bevor Seite rendert -->
<script>
  (function() {
    var saved = localStorage.getItem('jtd-theme');
    if (saved === 'light') {
      var link = document.querySelector('link[rel="stylesheet"][href*="just-the-docs"]');
      if (link) {
        link.href = link.href.replace(/just-the-docs-\w+/, 'just-the-docs-light');
      }
    }
  })();
</script>
